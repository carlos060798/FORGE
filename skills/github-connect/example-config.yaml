# Ejemplo de configuración generada por github-connect skill
# Este archivo se crea automáticamente en .sdd/sdd.config.yaml

git:
  # URL del repositorio remoto
  remote_url: "https://github.com/usuario/nombre-proyecto.git"

  # Estado de conexión a GitHub
  connected: true

  # Timestamp de cuándo se conectó
  connected_at: "2026-06-13T14:32:45Z"

  # Usuario de GitHub asociado
  github_user: "usuario"

  # Nombre del repositorio
  repo_name: "nombre-proyecto"

  # Rama principal
  branch: "main"

  # Visibilidad del repositorio (public/private)
  visibility: "public"

